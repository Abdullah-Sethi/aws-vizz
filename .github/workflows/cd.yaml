name: CD - Deploy to EC2

on:
  workflow_run:
    workflows: ["CI - Build and Push Docker Image"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user # Amazon Linux default user
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            # Ensure Docker is running
            sudo systemctl start docker
            sudo systemctl enable docker

            # Remove old container if exists
            docker stop devops-app || true
            docker rm devops-app || true

            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

            # Run container on port 5000 internally, mapped to 80 externally
            docker run -d \
              -p 80:5000 \
              --name devops-app \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASS=${{ secrets.DB_PASS }} \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              -e AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }} \
              -e AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }} \
              -e S3_BUCKET=${{ secrets.S3_BUCKET }} \
              ${{ secrets.DOCKER_USERNAME }}/devops-app:latest
